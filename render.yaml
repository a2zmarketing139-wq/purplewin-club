services:
  - type: web
    name: purplewin-club
    env: node
    buildCommand: NODE_ENV=development npm install && npx prisma generate && NODE_ENV=development npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PHONE
        value: "03052884177"
      - key: ADMIN_PASSWORD
        value: "@ ZainabAbbas732"
      - key: DATABASE_URL
        fromDatabase:
          name: purplewin-db
          property: connectionString

databases:
  - name: purplewin-db
    databaseName: purplewin
    user: purplewin
    plan: free
